<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KRM – ระบบขออนุมัติส่วนลด</title>
<link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700&family=Noto+Serif+Thai:wght@400;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
<style>
:root{--gold:#B8955A;--gold-l:#D4AF7A;--gold-d:#8A6C3A;--navy:#1A2540;--navy2:#243052;--cream:#FAF7F2;--cream2:#F0EBE0;--text:#2C2C2C;--muted:#7A7A7A;--border:#D9CEB8;--success:#1E6E47;--danger:#C0392B;--sh:0 4px 24px rgba(26,37,64,.10);}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Sarabun',sans-serif;background:var(--cream);color:var(--text);min-height:100vh;}
.hdr{background:var(--navy);padding:14px 28px;display:flex;align-items:center;gap:16px;}
.hdr h1{color:#fff;font-size:16px;font-weight:700;}
.tabs{background:var(--navy);display:flex;gap:2px;padding:0 22px;}
.tab{padding:9px 22px;border:none;background:rgba(255,255,255,.07);color:rgba(255,255,255,.5);font-size:13px;cursor:pointer;border-radius:7px 7px 0 0;}
.tab.active{background:var(--cream);color:var(--navy);font-weight:700;}
.panel{display:none;}.panel.active{display:block;}
.fw{max-width:850px;margin:28px auto;padding:0 18px 60px;}
.sec{font-family:'Noto Serif Thai',serif;font-size:11.5px;font-weight:600;color:var(--gold-d);border-bottom:1px solid var(--border);padding-bottom:6px;margin:22px 0 13px;text-transform:uppercase;}
.f{display:flex;flex-direction:column;gap:5px;margin-bottom:12px;}
.f label{font-size:11px;font-weight:700;color:var(--navy);}
.f input,.f select,.f textarea{border:1.5px solid var(--border);border-radius:7px;padding:8px 11px;font-family:'Sarabun',sans-serif;font-size:14px;outline:none;}
.doc-picker{display:grid;grid-template-columns:repeat(4,1fr);gap:9px;margin-bottom:22px;}
.dc{border:2px solid var(--border);border-radius:10px;padding:13px 8px;text-align:center;cursor:pointer;background:#fff;}
.dc.sel{border-color:var(--gold);background:#FDF8F0;}
.form-section{display:none;}.form-section.active{display:block;}
.sum-bar{background:var(--navy);border-radius:10px;padding:16px 20px;display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-top:15px;}
.sum-bar .v{font-size:20px;font-weight:700;color:#fff;font-family:'Noto Serif Thai',serif;}
/* Dynamic Table */
.items-table{width:100%;border-collapse:collapse;margin-top:10px;}
.items-table th{background:#000;color:#fff;font-size:11px;padding:8px;text-align:left;}
.items-table td{padding:5px;border-bottom:1px solid var(--border);}
.add-btn{margin-top:10px;padding:8px 15px;background:#fff;border:1.5px dashed var(--gold);color:var(--gold-d);border-radius:7px;cursor:pointer;font-weight:600;}
/* Dashboard Cards */
.card{background:#fff;border:1px solid var(--border);border-radius:12px;margin-bottom:14px;padding:18px;box-shadow:var(--sh);}
.badge{font-size:10px;font-weight:700;padding:3px 10px;border-radius:20px;text-transform:uppercase;}
.badge.pending_mgr{background:#FEF3C7;color:#92400E;}
.badge.pending_cmo{background:#E0E7FF;color:#3730A3;}
.badge.approved{background:#D1FAE5;color:#065F46;}
/* Graph */
.chart-container{margin-top:20px;background:#fff;padding:20px;border-radius:12px;border:1px solid var(--border);}
.bar-row{display:flex;align-items:center;gap:10px;margin-bottom:10px;}
.bar-label{width:100px;font-size:12px;text-align:right;}
.bar-track{flex:1;background:var(--cream2);height:20px;border-radius:10px;overflow:hidden;}
.bar-fill{height:100%;background:var(--gold);border-radius:10px;transition:width 0.5s;}
.bar-val{width:80px;font-size:12px;font-weight:700;}
.modal-back{display:none;position:fixed;inset:0;z-index:1000;background:rgba(0,0,0,.55);align-items:center;justify-content:center;}
.modal-back.open{display:flex;}
.modal-box{background:#fff;border-radius:16px;padding:26px;width:92%;max-width:500px;}
#sigCanvas{width:100%;height:170px;border:2px dashed var(--border);border-radius:10px;background:#FAFAF8;}
#toast{position:fixed;bottom:22px;left:50%;transform:translateX(-50%);background:var(--navy);color:#fff;padding:10px 24px;border-radius:9px;font-size:13px;opacity:0;transition:opacity .3s;z-index:9999;}
#toast.show{opacity:1;}
/* PRINT LOGIC: ซ่อน Print Area ในหน้า Dashboard ตลอดเวลา */
#printArea { display: none; }
@media print {
    body > *:not(#printArea) { display: none !important; }
    #printArea { display: block !important; }
}
</style>
</head>
<body>

<div id="login-screen" style="display:flex;position:fixed;inset:0;z-index:9000;background:var(--navy);align-items:center;justify-content:center;">
  <div style="width:92%;max-width:380px;text-align:center;">
    <h2 style="color:#fff;margin-bottom:25px;">KRM Approval System</h2>
    <div style="background:rgba(255,255,255,.08);padding:30px;border-radius:15px;border:1px solid rgba(255,255,255,.1);">
        <input id="login-user" placeholder="Username" style="width:100%;padding:12px;margin-bottom:12px;border-radius:8px;border:none;">
        <input id="login-pass" type="password" placeholder="Password" style="width:100%;padding:12px;margin-bottom:20px;border-radius:8px;border:none;">
        <button onclick="doLogin()" style="width:100%;padding:13px;background:var(--gold);border:none;border-radius:8px;font-weight:700;cursor:pointer;">เข้าสู่ระบบ</button>
        <div id="login-error" style="color:#f87171;margin-top:15px;font-size:13px;"></div>
    </div>
  </div>
</div>

<div id="app-body" style="display:none;">
    <div class="hdr">
        <h1>ระบบขออนุมัติส่วนลด KRM</h1>
        <div style="margin-left:auto;color:#fff;display:flex;align-items:center;gap:15px;">
            <span id="user-badge" style="font-size:12px;"></span>
            <button onclick="logout()" style="background:none;border:1px solid #fff;color:#fff;padding:4px 10px;border-radius:5px;cursor:pointer;">Logout</button>
        </div>
    </div>

    <div class="tabs">
        <button class="tab active" id="tab-btn-form" onclick="switchTab('form')">📋 ยื่นคำขอ</button>
        <button class="tab" id="tab-btn-approve" onclick="switchTab('approve')">✅ อนุมัติ / ติดตาม</button>
        <button class="tab" id="tab-btn-report" onclick="switchTab('report')">📊 รายงาน</button>
    </div>

    <div id="tab-form" class="panel active">
        <div class="fw">
            <div class="sec">เลือกประเภทใบขออนุมัติ</div>
            <div class="doc-picker">
                <div class="dc sel" data-type="mixed" onclick="selType('mixed')">📋 รายการรวม</div>
                <div class="dc" data-type="room" onclick="selType('room')">🛏️ ห้องพัก</div>
                <div class="dc" data-type="procedure" onclick="selType('procedure')">💉 หัตถการ</div>
                <div class="dc" data-type="gift" onclick="selType('gift')">🎁 ของแถม</div>
            </div>
            <div class="sec">ข้อมูลลูกค้า</div>
            <div style="display:grid;grid-template-columns:1fr 1fr;gap:15px;">
                <div class="f"><label>HN</label><input id="f-hn" placeholder="Kxxxxxx"></div>
                <div class="f"><label>ชื่อลูกค้า</label><input id="f-name"></div>
            </div>
            <div style="display:grid;grid-template-columns:1fr 1fr;gap:15px;">
                <div class="f"><label>ชื่อ Sale (ผู้จัดทำ)</label><input id="f-sale" placeholder="ระบุชื่อจริง"></div>
                <div class="f"><label>วันที่นัด/ทำหัตถการ</label><input id="f-opdate" type="date"></div>
            </div>

            <div id="sec-mixed" class="form-section active">
                <table class="items-table">
                    <thead><tr><th style="width:50%;">รายการหัตถการ</th><th>ราคาเต็ม (฿)</th><th>ลด %</th><th></th></tr></thead>
                    <tbody id="mixed-tbody"></tbody>
                </table>
                <button class="add-btn" onclick="addMixedRow()">+ เพิ่มหัตถการ</button>
            </div>

            <div id="sec-room" class="form-section">
                <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;">
                    <div class="f"><label>เช็คอิน</label><input id="r-ci" type="date" oninput="calcRoom()"></div>
                    <div class="f"><label>เช็คเอาต์</label><input id="r-co" type="date" oninput="calcRoom()"></div>
                    <div class="f"><label>ราคา/คืน</label><input id="r-ppn" type="number" oninput="calcRoom()"></div>
                </div>
                <div class="f"><label>ส่วนลด (%)</label><input id="r-pct" type="number" oninput="calcRoom()"></div>
            </div>

            <div id="sec-procedure" class="form-section">
                <div class="f"><label>ชื่อหัตถการ</label><input id="p-name"></div>
                <div style="display:grid;grid-template-columns:1fr 1fr;gap:15px;">
                    <div class="f"><label>ราคาเต็ม (฿)</label><input id="p-full" type="number" oninput="calcProc()"></div>
                    <div class="f"><label>ส่วนลด (%)</label><input id="p-pct" type="number" oninput="calcProc()"></div>
                </div>
            </div>

            <div id="sec-gift" class="form-section">
                <textarea id="g-items" style="width:100%; min-height:80px;" placeholder="ระบุรายการของแถม..."></textarea>
                <div class="f"><label>มูลค่ารวม (฿)</label><input id="g-val" type="number" oninput="calcGift()"></div>
            </div>

            <div class="sum-bar">
                <div><label style="color:var(--gold-l); font-size:10px;">ส่วนลดรวม</label><div class="v" id="sum-disc">0</div></div>
                <div><label style="color:var(--gold-l); font-size:10px;">ลูกค้าจ่ายสุทธิ</label><div class="v" id="sum-final">0</div></div>
            </div>

            <div class="sec">เหตุผลเพิ่มเติม</div>
            <textarea id="f-reason" style="width:100%; min-height:60px;"></textarea>

            <div class="sec">ลายเซ็นผู้จัดทำ</div>
            <div style="border:2px dashed var(--border); background:#fff; height:120px; border-radius:10px; overflow:hidden;">
                <canvas id="creatorCanvas" width="750" height="120" style="width:100%; height:100%; cursor:crosshair;"></canvas>
            </div>
            <button onclick="clearCreatorSig()" style="margin-top:10px; font-size:11px;">ล้างลายเซ็น</button>
            <button class="btn-submit" onclick="submitRequest()">📤 ส่งคำขออนุมัติ</button>
        </div>
    </div>

    <div id="tab-approve" class="panel">
        <div class="fw"><div id="req-list"></div></div>
    </div>

    <div id="tab-report" class="panel">
        <div class="fw">
            <div style="display:flex; gap:10px; margin-bottom:20px; align-items:flex-end;">
                <div class="f"><label>เดือน</label><select id="rpt-month" onchange="buildReport()"></select></div>
                <div class="f"><label>ปี</label><select id="rpt-year" onchange="buildReport()"></select></div>
            </div>
            <div id="rpt-kpis" style="display:grid; grid-template-columns:repeat(3,1fr); gap:12px; margin-bottom:20px;"></div>
            <div class="chart-container"><div class="sec" style="margin-top:0;">มูลค่าส่วนลดตามประเภท</div><div id="rpt-chart"></div></div>
            <div class="sec">รายการทั้งหมด</div>
            <table class="rpt-table"><thead style="background:var(--navy); color:#fff;"><tr><th style="padding:12px;">วันที่</th><th>HN</th><th>ลูกค้า</th><th>ประเภท</th><th>ส่วนลด%</th><th>สถานะ</th></tr></thead><tbody id="rpt-tbody"></tbody></table>
        </div>
    </div>
</div>

<div id="sigModal" class="modal-back">
  <div class="modal-box">
    <h3 id="sig-title">เซ็นอนุมัติ</h3>
    <textarea id="approval-comment" style="width:100%; margin:10px 0; min-height:60px;" placeholder="ระบุคอมเม้นต์..."></textarea>
    <input id="pin-input" type="password" placeholder="PIN 4 หลัก" maxlength="4" style="width:100%; padding:12px; text-align:center; font-size:24px; margin-bottom:15px; border:1px solid #ccc; border-radius:8px;">
    <canvas id="sigCanvas" width="450" height="170" style="border:1px solid #ddd; border-radius:8px;"></canvas>
    <div style="display:flex; gap:10px; margin-top:20px;"><button onclick="confirmSig()" style="flex:2; padding:12px; background:var(--success); color:#fff; border:none; border-radius:8px; font-weight:700; cursor:pointer;">ยืนยัน</button><button onclick="closeSigModal()" style="flex:1; padding:12px; background:#eee; border:none; border-radius:8px; cursor:pointer;">ยกเลิก</button></div>
  </div>
</div>

<div id="printArea"></div>
<div id="toast"></div>

<script>
// --- CONFIG & DB ---
const SUPABASE_URL = 'https://hnpccpuwxrebxangdane.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImhucGNjcHV3eHJlYnhhbmdkYW5lIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQyNTAxNTAsImV4cCI6MjA4OTgyNjE1MH0.34CqrdqVeHF6_RUArM2UIIf3oefqrHeMwuiNJwEV1Vs';
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

const USERS = {
    sale_mgr: { name: 'นภา ชำนาญรบ', role: 'manager', pin: 'mgr1234', email: 'chnabha2529@gmail.com' },
    cmo: { name: 'นายสกุลชัย ดันตระบัณฑิตย์', role: 'cmo', pin: 'cmo5678', email: 'Sakulchai.t@krmhospital-inter.com' }
};

const LOGIN_ACCOUNTS = [
    { username: 'sale', password: 'sale1234', label: 'Sale Staff Team', role: 'sale' },
    { username: 'napa', password: 'mgr1234', label: 'นภา ชำนาญรบ', role: 'manager' },
    { username: 'cmo', password: 'cmo5678', label: 'นายสกุลชัย ดันตระบัณฑิตย์', role: 'cmo' }
];

let currentUser = null, allReqs = [], sigPendingId = null, curType = 'mixed';
emailjs.init('M3GFyEbVcO48C7wy0');

// --- DYNAMIC MIXED ---
function addMixedRow() {
    const tbody = document.getElementById('mixed-tbody');
    const tr = document.createElement('tr');
    tr.innerHTML = `<td><input type="text" class="m-item-name" placeholder="ชื่อหัตถการ..."></td>
        <td><input type="number" class="m-item-full" value="0" oninput="calcMixed()"></td>
        <td><input type="number" class="m-item-pct" value="0" oninput="calcMixed()"></td>
        <td align="center"><button style="color:red;border:none;background:none;cursor:pointer;" onclick="this.parentElement.parentElement.remove(); calcMixed();">✕</button></td>`;
    tbody.appendChild(tr);
}

// --- CALCULATIONS ---
function calcMixed() {
    let tf=0, td=0;
    document.querySelectorAll('#mixed-tbody tr').forEach(r => {
        let f = parseFloat(r.querySelector('.m-item-full').value)||0, p = parseFloat(r.querySelector('.m-item-pct').value)||0;
        tf += f; td += (f*p/100);
    });
    updateSummary(tf, td);
}
function calcProc() { let f=parseFloat(document.getElementById('p-full').value)||0, p=parseFloat(document.getElementById('p-pct').value)||0; updateSummary(f, (f*p/100)); }
function calcGift() { updateSummary(parseFloat(document.getElementById('g-val').value)||0, 0); }
function calcRoom() {
    let ci=new Date(document.getElementById('r-ci').value), co=new Date(document.getElementById('r-co').value);
    let p=parseFloat(document.getElementById('r-ppn').value)||0, pct=parseFloat(document.getElementById('r-pct').value)||0;
    if(co>ci) { let t=p*((co-ci)/86400000); updateSummary(t, (t*pct/100)); }
}
function updateSummary(full, disc) {
    document.getElementById('sum-disc').textContent = disc.toLocaleString();
    document.getElementById('sum-final').textContent = (full - disc).toLocaleString();
}
function resetSum() { document.getElementById('sum-disc').textContent='0'; document.getElementById('sum-final').textContent='0'; }

// --- DATA ACTIONS ---
async function submitRequest() {
    let hn=document.getElementById('f-hn').value, name=document.getElementById('f-name').value, sale=document.getElementById('f-sale').value;
    if(!hn||!name||!sale) return alert("กรุณาระบุ HN, ชื่อลูกค้า และ Sale");
    let dv = parseFloat(document.getElementById('sum-disc').textContent.replace(/,/g,''));
    let fv = parseFloat(document.getElementById('sum-final').textContent.replace(/,/g,''));
    let ov = dv+fv; let pct = ov>0?(dv/ov*100):0;
    let items=[];
    if(curType==='mixed') document.querySelectorAll('#mixed-tbody tr').forEach(r => items.push({n:r.querySelector('.m-item-name').value,f:parseFloat(r.querySelector('.m-item-full').value),p:parseFloat(r.querySelector('.m-item-pct').value)}));
    let status = 'pending_mgr';
    if(currentUser.role === 'manager' && pct > 10) status = 'pending_cmo';
    const payload = {
        hn, customer_name: name, sale_agent: sale, doc_type: curType,
        original_price: ov, discount_pct: pct.toFixed(2), discount_amount: dv, final_price: fv,
        status: status, reason: document.getElementById('f-reason').value,
        doc_data: { 
            creator_name: sale, creator_sig: document.getElementById('creatorCanvas').toDataURL(),
            opdate: document.getElementById('f-opdate').value, items: items,
            procedure_name: document.getElementById('p-name').value, gift_desc: document.getElementById('g-items').value
        }
    };
    const { data, error } = await sb.from('approval_requests').insert(payload).select().single();
    if(!error) { showToast("ส่งคำขอสำเร็จ"); sendEmail(data, 'manager'); resetForm(); switchTab('approve'); }
}

async function doApprove(id, sig, pin, comment) {
    const r = allReqs.find(x => x.id === id);
    let newStatus = '';
    if(currentUser.role === 'manager') {
        if(pin !== USERS.sale_mgr.pin) return alert("PIN ผิด");
        newStatus = r.discount_pct <= 10 ? 'approved' : 'pending_cmo';
        if(newStatus === 'pending_cmo') sendEmail(r, 'cmo', "Manager รับทราบแล้ว รอ CMO อนุมัติ final");
    } else if(currentUser.role === 'cmo') {
        if(pin !== USERS.cmo.pin) return alert("PIN ผิด");
        newStatus = 'approved';
    }
    const { error } = await sb.from('approval_requests').update({ 
        status: newStatus,
        manager_name: currentUser.role === 'manager' ? USERS.sale_mgr.name : r.manager_name,
        cmo_name: currentUser.role === 'cmo' ? USERS.cmo.name : r.cmo_name,
        doc_data: { ...r.doc_data, [currentUser.role+'_sig']: sig, [currentUser.role+'_comment']: comment }
    }).eq('id', id);
    if(!error) { closeSigModal(); loadReqs(); showToast("ดำเนินการสำเร็จ"); }
}

function sendEmail(r, role, msg = "") {
    const target = USERS[role === 'manager' ? 'sale_mgr' : 'cmo'];
    emailjs.send('service_k3m1kzl', 'template_o5c9od9', {
        to_email: target.email, to_role: target.role, customer_name: r.customer_name, hn: r.hn, sale_agent: r.sale_agent,
        discount_pct: r.discount_pct + '%', final_price: r.final_price.toLocaleString(), custom_message: msg, app_url: window.location.origin
    }).catch(console.error);
}

// --- REPORT ---
function initReportControls() {
    const m = document.getElementById('rpt-month'), y = document.getElementById('rpt-year'), now = new Date();
    const months = ['ม.ค.','ก.พ.','มี.ค.','เม.ย.','พ.ค.','มิ.ย.','ก.ค.','ส.ค.','ก.ย.','ต.ค.','พ.ย.','ธ.ค.'];
    m.innerHTML = months.map((name, i) => `<option value="${i}" ${i === now.getMonth()?'selected':''}>${name}</option>`).join('');
    y.innerHTML = [0, 1, 2].map(off => `<option value="${now.getFullYear()-off}">${now.getFullYear()-off+543}</option>`).join('');
}
function buildReport() {
    const mo = parseInt(document.getElementById('rpt-month').value), yr = parseInt(document.getElementById('rpt-year').value);
    const filtered = allReqs.filter(r => { let d = new Date(r.created_at); return d.getMonth() === mo && d.getFullYear() === yr; });
    const approved = filtered.filter(r => r.status === 'approved');
    document.getElementById('rpt-kpis').innerHTML = `
        <div class="card" style="text-align:center;"><label>ทั้งหมด</label><div style="font-size:22px;font-weight:700;">${filtered.length}</div></div>
        <div class="card" style="text-align:center;"><label>อนุมัติแล้ว</label><div style="font-size:22px;font-weight:700;color:var(--success);">${approved.length}</div></div>
        <div class="card" style="text-align:center;"><label>ยอดสุทธิ</label><div style="font-size:22px;font-weight:700;">${approved.reduce((s,x)=>s+x.final_price,0).toLocaleString()}</div></div>`;
    let types = { mixed:0, room:0, procedure:0, gift:0 }, maxV = 1;
    filtered.forEach(r => types[r.doc_type] += r.discount_amount);
    Object.values(types).forEach(v => { if(v>maxV) maxV=v; });
    document.getElementById('rpt-chart').innerHTML = Object.entries(types).map(([k, v]) => `
        <div class="bar-row"><div class="bar-label">${k.toUpperCase()}</div><div class="bar-track"><div class="bar-fill" style="width:${(v/maxV*100)}%"></div></div><div class="bar-val">${v.toLocaleString()}</div></div>`).join('');
    document.getElementById('rpt-tbody').innerHTML = filtered.map(r => `<tr><td>${new Date(r.created_at).toLocaleDateString()}</td><td>${r.hn}</td><td>${r.customer_name}</td><td>${r.doc_type}</td><td>${r.discount_pct}%</td><td>${r.status}</td></tr>`).join('');
}

// --- HELPERS ---
function doLogin() {
    const u=document.getElementById('login-user').value, p=document.getElementById('login-pass').value;
    const found=LOGIN_ACCOUNTS.find(a=>a.username===u && a.password===p);
    if(found) { currentUser=found; document.getElementById('login-screen').style.display='none'; document.getElementById('app-body').style.display='block'; document.getElementById('user-badge').textContent=`${found.label} (${found.role})`; switchTab(found.role==='sale'?'form':'approve'); initSigPads(); }
    else alert("Login Fail");
}
function logout() { location.reload(); }
function switchTab(t) {
    document.querySelectorAll('.tab, .panel').forEach(el => el.classList.remove('active'));
    document.getElementById('tab-btn-'+t).classList.add('active'); document.getElementById('tab-'+t).classList.add('active');
    if(t==='report') { initReportControls(); buildReport(); } else loadReqs();
}
function openSig(id) { sigPendingId=id; document.getElementById('pin-input').value=''; document.getElementById('approval-comment').value=''; document.getElementById('sigModal').classList.add('open'); }
function closeSigModal() { document.getElementById('sigModal').classList.remove('open'); }
function confirmSig() { doApprove(sigPendingId, document.getElementById('sigCanvas').toDataURL(), document.getElementById('pin-input').value, document.getElementById('approval-comment').value); }
function showToast(m) { const t=document.getElementById('toast'); t.textContent=m; t.classList.add('show'); setTimeout(()=>t.classList.remove('show'), 3000); }
function resetForm() { ['f-hn','f-name','f-sale','f-opdate','f-reason','p-name','p-full','p-pct','r-ci','r-co','r-ppn','r-pct','g-items','g-val'].forEach(id => {if(document.getElementById(id)) document.getElementById(id).value='';}); document.getElementById('mixed-tbody').innerHTML=''; addMixedRow(); resetSum(); clearCreatorSig(); }
function initSigPads() {
    [document.getElementById('creatorCanvas'), document.getElementById('sigCanvas')].forEach(canvas => {
        const ctx=canvas.getContext('2d'); let draw=false;
        const getP=(e)=>{ const r=canvas.getBoundingClientRect(); const s=e.touches?e.touches[0]:e; return { x:(s.clientX-r.left)*(canvas.width/r.width), y:(s.clientY-r.top)*(canvas.height/r.height)}; };
        canvas.addEventListener('mousedown', e => { draw=true; let p=getP(e); ctx.beginPath(); ctx.moveTo(p.x, p.y); });
        canvas.addEventListener('mousemove', e => { if(!draw)return; let p=getP(e); ctx.lineTo(p.x, p.y); ctx.stroke(); });
        window.addEventListener('mouseup', () => draw=false);
        canvas.addEventListener('touchstart', e => { e.preventDefault(); draw=true; let p=getP(e); ctx.beginPath(); ctx.moveTo(p.x, p.y); }, {passive:false});
        canvas.addEventListener('touchmove', e => { e.preventDefault(); if(!draw)return; let p=getP(e); ctx.lineTo(p.x, p.y); ctx.stroke(); }, {passive:false});
        ctx.strokeStyle='#1A2540'; ctx.lineWidth=2.5; ctx.lineCap='round';
    });
}
function clearCreatorSig() { document.getElementById('creatorCanvas').getContext('2d').clearRect(0,0,750,130); }
addMixedRow();
