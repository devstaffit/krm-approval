<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KRM – ระบบขออนุมัติส่วนลด</title>
<link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700&family=Noto+Serif+Thai:wght@400;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
<style>
/* CSS ส่วนใหญ่คงเดิมเพื่อรักษา Design ของคุณไว้ */
:root{--gold:#B8955A;--gold-l:#D4AF7A;--gold-d:#8A6C3A;--navy:#1A2540;--navy2:#243052;--cream:#FAF7F2;--cream2:#F0EBE0;--text:#2C2C2C;--muted:#7A7A7A;--border:#D9CEB8;--success:#1E6E47;--danger:#C0392B;--sh:0 4px 24px rgba(26,37,64,.10);}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Sarabun',sans-serif;background:var(--cream);color:var(--text);min-height:100vh;}
#cfg{background:#fff3cd;border-bottom:2px solid #ffc107;padding:10px 24px;text-align:center;font-size:13px;color:#856404;}
#cfg.hide{display:none;}
.hdr{background:var(--navy);padding:14px 28px;display:flex;align-items:center;gap:16px;}
.hdr h1{color:#fff;font-size:16px;font-weight:700;}.hdr p{color:var(--gold-l);font-size:12px;margin-top:2px;}
.tabs{background:var(--navy);display:flex;gap:2px;padding:0 22px;}
.tab{padding:9px 22px;border:none;background:rgba(255,255,255,.07);color:rgba(255,255,255,.5);font-family:'Sarabun',sans-serif;font-size:13px;font-weight:500;cursor:pointer;border-radius:7px 7px 0 0;transition:all .2s;}
.tab.active{background:var(--cream);color:var(--navy);font-weight:700;}
.tab:not(.active):hover{background:rgba(255,255,255,.14);color:#fff;}
.panel{display:none;}.panel.active{display:block;}
.fw{max-width:780px;margin:28px auto;padding:0 18px 60px;}
.sec{font-family:'Noto Serif Thai',serif;font-size:11.5px;font-weight:600;color:var(--gold-d);letter-spacing:.1em;text-transform:uppercase;border-bottom:1px solid var(--border);padding-bottom:6px;margin:22px 0 13px;}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:13px;}
.f{display:flex;flex-direction:column;gap:5px;}
.f label{font-size:11px;font-weight:700;color:var(--navy);letter-spacing:.04em;text-transform:uppercase;}
.f input,.f select,.f textarea{border:1.5px solid var(--border);border-radius:7px;padding:8px 11px;font-family:'Sarabun',sans-serif;font-size:14px;background:#fff;color:var(--text);outline:none;transition:border-color .2s,box-shadow .2s;}
.items-table{width:100%;border-collapse:collapse;min-width:540px;}
.items-table th{background:#000;color:#fff;font-size:11px;padding:9px 10px;text-align:left;}
.sum-bar{background:var(--navy);border-radius:10px;padding:16px 20px;margin-top:12px;display:grid;grid-template-columns:repeat(3,1fr);gap:12px;}
.sum-bar .v{font-size:20px;font-weight:700;color:#fff;font-family:'Noto Serif Thai',serif;}
.btn-submit{width:100%;margin-top:22px;padding:14px;background:var(--gold);color:var(--navy);border:none;border-radius:9px;font-weight:700;cursor:pointer;}
.card{background:#fff;border:1px solid var(--border);border-radius:12px;margin-bottom:14px;box-shadow:var(--sh);overflow:hidden;}
.badge{font-size:10px;font-weight:700;padding:3px 10px;border-radius:20px;text-transform:uppercase;}
.badge.pending_mgr{background:#FEF3C7;color:#92400E;}
.badge.pending_cmo{background:#E0E7FF;color:#3730A3;}
.badge.approved{background:#D1FAE5;color:#065F46;}
.modal-back{display:none;position:fixed;inset:0;z-index:1000;background:rgba(0,0,0,.55);align-items:center;justify-content:center;}
.modal-back.open{display:flex;}
.modal-box{background:#fff;border-radius:16px;padding:26px;width:92%;max-width:500px;}
#sigCanvas{width:100%;height:170px;border:2px dashed var(--border);border-radius:10px;background:#FAFAF8;}
#toast{position:fixed;bottom:22px;left:50%;transform:translateX(-50%);background:var(--navy);color:#fff;padding:10px 24px;border-radius:9px;font-size:13px;opacity:0;transition:opacity .3s;z-index:9999;}
#toast.show{opacity:1;}
@media print{body>*:not(#printArea){display:none!important;}#printArea{display:block!important;}}
</style>
</head>
<body>

<div id="login-screen" style="display:none;position:fixed;inset:0;z-index:9000;background:var(--navy);align-items:center;justify-content:center;">
  <div style="width:92%;max-width:380px;text-align:center;color:#fff;">
    <h2 style="margin-bottom:20px;">KRM Login</h2>
    <div style="background:rgba(255,255,255,.1);padding:30px;border-radius:15px;">
        <input id="login-user" placeholder="Username" style="width:100%;padding:12px;margin-bottom:10px;border-radius:8px;border:none;">
        <input id="login-pass" type="password" placeholder="Password" style="width:100%;padding:12px;margin-bottom:20px;border-radius:8px;border:none;">
        <button onclick="doLogin()" style="width:100%;padding:12px;background:var(--gold);border:none;border-radius:8px;font-weight:700;cursor:pointer;">Login</button>
        <div id="login-error" style="color:#ff7675;margin-top:10px;font-size:12px;"></div>
    </div>
  </div>
</div>

<div id="app-body" style="display:none;">
    <div class="hdr">
        <h1 style="color:#fff;">KRM Approval System</h1>
        <div style="margin-left:auto;color:#fff;">
            <span id="user-badge"></span>
            <button onclick="logout()" style="margin-left:10px;padding:5px 10px;cursor:pointer;">Logout</button>
        </div>
    </div>

    <div class="tabs">
        <button class="tab active" id="tab-btn-form" onclick="switchTab('form')">📋 ยื่นคำขอ</button>
        <button class="tab" id="tab-btn-approve" onclick="switchTab('approve')">✅ อนุมัติ / ติดตาม</button>
    </div>

    <div id="tab-form" class="panel active">
        <div class="fw">
            <div class="sec">ข้อมูลลูกค้า</div>
            <div class="g2">
                <div class="f"><label>HN</label><input id="f-hn" placeholder="Kxxxxxx"></div>
                <div class="f"><label>ชื่อลูกค้า</label><input id="f-name"></div>
            </div>
            <div class="f" style="margin-top:10px;"><label>ชื่อพนักงานขาย (Sale)</label><input id="f-sale"></div>
            
            <div class="sec">รายการส่วนลด</div>
            <div class="f"><label>ราคาเต็ม (฿)</label><input id="p-full" type="number" oninput="calcQuick()"></div>
            <div class="f" style="margin-top:10px;"><label>ส่วนลด (%)</label><input id="p-pct" type="number" oninput="calcQuick()"></div>
            
            <div class="sum-bar">
                <div><label>ส่วนลด</label><div class="v" id="sum-disc">0</div></div>
                <div><label>ลูกค้าจ่าย</label><div class="v" id="sum-final">0</div></div>
            </div>

            <div class="sec">ลายเซ็นผู้จัดทำ</div>
            <div style="border:1px dashed #ccc; background:#fff; height:120px;">
                <canvas id="creatorCanvas" width="700" height="120" style="width:100%; height:100%;"></canvas>
            </div>
            <button onclick="clearCreatorSig()" style="margin-top:5px;">ล้างลายเซ็น</button>

            <button class="btn-submit" onclick="submitRequest()">📤 ส่งคำขออนุมัติ</button>
        </div>
    </div>

    <div id="tab-approve" class="panel">
        <div class="fw">
            <div id="req-list"></div>
        </div>
    </div>
</div>

<div id="sigModal" class="modal-back">
  <div class="modal-box">
    <h3 id="sig-title">เซ็นอนุมัติ</h3>
    <input id="pin-input" type="password" placeholder="ใส่ PIN 4 หลัก" style="width:100%;padding:10px;margin:15px 0;text-align:center;font-size:20px;">
    <canvas id="sigCanvas" width="450" height="170"></canvas>
    <div style="display:flex;gap:10px;margin-top:15px;">
        <button onclick="confirmSig()" style="flex:1;padding:10px;background:var(--success);color:#fff;border:none;border-radius:8px;cursor:pointer;">ยืนยัน</button>
        <button onclick="closeSigModal()" style="flex:1;padding:10px;background:#ccc;border:none;border-radius:8px;cursor:pointer;">ยกเลิก</button>
    </div>
  </div>
</div>

<div id="printArea"></div>
<div id="toast"></div>

<script>
// --- CONFIG & CONSTANTS ---
const SUPABASE_URL = 'https://hnpccpuwxrebxangdane.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...'; // ใส่ Key ของคุณ
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

const USERS = {
    sale_mgr: { name: 'นภา ชำนาญรบ', role: 'Sale Manager', pin: '1234' },
    cmo: { name: 'นายสกุลชัย ดันตระบัณฑิตย์', role: 'Chief Marketing Officer', pin: '5678' }
};

const LOGIN_ACCOUNTS = [
    { username: 'sale1', password: '123', label: 'เซลล์สวยงาม', role: 'sale' },
    { username: 'napa', password: '123', label: 'นภา ชำนาญรบ', role: 'manager' },
    { username: 'cmo', password: '123', label: 'นายสกุลชัย ดันตระบัณฑิตย์', role: 'cmo' }
];

let currentUser = null;
let allReqs = [];
let sigPendingId = null;

// --- CORE LOGIC ---

function calcQuick() {
    let full = parseFloat(document.getElementById('p-full').value) || 0;
    let pct = parseFloat(document.getElementById('p-pct').value) || 0;
    let disc = (full * pct) / 100;
    let final = full - disc;
    document.getElementById('sum-disc').textContent = disc.toLocaleString();
    document.getElementById('sum-final').textContent = final.toLocaleString();
}

async function submitRequest() {
    let hn = document.getElementById('f-hn').value;
    let name = document.getElementById('f-name').value;
    let pct = parseFloat(document.getElementById('p-pct').value) || 0;
    let full = parseFloat(document.getElementById('p-full').value) || 0;
    let sale = document.getElementById('f-sale').value;

    if(!hn || !name || !full) return alert("กรุณากรอกข้อมูลให้ครบ");

    let creatorSig = document.getElementById('creatorCanvas').toDataURL();
    
    // กำหนดสถานะตั้งต้นตามเงื่อนไข
    // ถ้าส่วนลด <= 10% -> รอ Manager อนุมัติ (pending_mgr)
    // ถ้าส่วนลด > 10% -> รอ Manager ตรวจรับทราบ (pending_mgr) ยกเว้น Manager ทำเองจะไป pending_cmo
    let status = 'pending_mgr';
    if(currentUser.role === 'manager' && pct > 10) status = 'pending_cmo';

    let payload = {
        hn,
        customer_name: name,
        sale_agent: sale, // ชื่อที่พิมพ์ในช่อง Sale
        original_price: full,
        discount_pct: pct,
        final_price: full - ((full * pct) / 100),
        status: status,
        doc_data: {
            creator_name: currentUser.label, // คนที่ Login คือ "ผู้จัดทำ" ตัวจริง
            creator_role: currentUser.role,
            creator_sig: creatorSig
        }
    };

    const { error } = await sb.from('approval_requests').insert(payload);
    if(!error) {
        showToast("ส่งคำขอเรียบร้อยแล้ว");
        resetForm();
        switchTab('approve');
    }
}

async function doApprove(id, sig, pin) {
    const r = allReqs.find(x => x.id === id);
    let newStatus = '';
    let updateObj = { doc_data: { ...r.doc_data } };

    // 1. Case Manager
    if(currentUser.role === 'manager') {
        if(pin !== USERS.sale_mgr.pin) return alert("PIN ผิด");
        if(r.discount_pct <= 10) {
            newStatus = 'approved'; // ส่วนลดน้อย อนุมัติจบเลย
        } else {
            newStatus = 'pending_cmo'; // ส่วนลดมาก ส่งต่อให้ CMO
        }
        updateObj.manager_name = USERS.sale_mgr.name;
        updateObj.doc_data.manager_sig = sig;
        updateObj.manager_signed_at = new Date();
    } 
    // 2. Case CMO
    else if(currentUser.role === 'cmo') {
        if(pin !== USERS.cmo.pin) return alert("PIN ผิด");
        newStatus = 'approved';
        updateObj.cmo_name = USERS.cmo.name;
        updateObj.doc_data.cmo_sig = sig;
        updateObj.approved_at = new Date();
    }

    const { error } = await sb.from('approval_requests').update({ status: newStatus, ...updateObj }).eq('id', id);
    if(!error) {
        closeSigModal();
        loadReqs();
        showToast("ดำเนินการเรียบร้อย");
    }
}

// --- UI & PRINT ---

function renderList() {
    const list = document.getElementById('req-list');
    list.innerHTML = allReqs.map(r => {
        let btn = '';
        if(r.status === 'pending_mgr' && currentUser.role === 'manager') btn = `<button onclick="openSig('${r.id}')">เซ็นรับทราบ/อนุมัติ</button>`;
        if(r.status === 'pending_cmo' && currentUser.role === 'cmo') btn = `<button onclick="openSig('${r.id}')">เซ็นอนุมัติ (CMO)</button>`;
        
        return `
            <div class="card" style="padding:15px;">
                <div style="display:flex; justify-content:space-between;">
                    <strong>${r.customer_name} (${r.hn})</strong>
                    <span class="badge ${r.status}">${r.status}</span>
                </div>
                <p>ส่วนลด: ${r.discount_pct}% | ผู้จัดทำ: ${r.doc_data.creator_name}</p>
                <div style="margin-top:10px;">
                    ${btn}
                    <button onclick="printDoc('${r.id}')">🖨️ พิมพ์ใบขออนุมัติ</button>
                </div>
            </div>
        `;
    }).join('');
}

function printDoc(id) {
    const r = allReqs.find(x => x.id === id);
    const d = r.doc_data;
    const isHighDisc = r.discount_pct > 10;
    
    // Logic การแสดงผลลายเซ็นในหน้าพิมพ์
    let sigTable = `
        <table style="width:100%; text-align:center; margin-top:40px;">
            <tr>
                <td style="width:33%;">
                    <p style="font-size:12px;">ผู้จัดทำ</p>
                    <img src="${d.creator_sig}" style="height:50px;">
                    <p>(${d.creator_name})</p>
                </td>

                <td style="width:33%;">
                    ${isHighDisc ? `
                        <p style="font-size:12px;">ผู้ตรวจสอบ/รับทราบ</p>
                        ${d.manager_sig ? `<img src="${d.manager_sig}" style="height:50px;">` : '<div style="height:50px;"></div>'}
                        <p>(${USERS.sale_mgr.name})</p>
                        <p style="font-size:10px;">Sale Manager</p>
                    ` : ''}
                </td>

                <td style="width:33%;">
                    <p style="font-size:12px;">ผู้อนุมัติ</p>
                    ${!isHighDisc ? `
                        ${d.manager_sig ? `<img src="${d.manager_sig}" style="height:50px;">` : '<div style="height:50px;"></div>'}
                        <p>(${USERS.sale_mgr.name})</p>
                    ` : `
                        ${d.cmo_sig ? `<img src="${d.cmo_sig}" style="height:50px;">` : '<div style="height:50px;"></div>'}
                        <p>(${USERS.cmo.name})</p>
                        <p style="font-size:10px;">CMO</p>
                    `}
                </td>
            </tr>
        </table>
    `;

    document.getElementById('printArea').innerHTML = `
        <div style="padding:40px; font-family:Sarabun;">
            <h2 style="text-align:center;">ใบขออนุมัติส่วนลด</h2>
            <p>เรียน ผู้บริหารที่เกี่ยวข้อง</p>
            <p>เนื่องด้วยฝ่ายขายมีความประสงค์ขออนุมัติส่วนลดให้คุณ <strong>${r.customer_name} (HN: ${r.hn})</strong></p>
            <table border="1" style="width:100%; border-collapse:collapse; margin:20px 0;">
                <tr><th>ราคาเต็ม</th><th>ส่วนลด %</th><th>ยอดจ่ายสุทธิ</th></tr>
                <tr>
                    <td align="center">${r.original_price.toLocaleString()}</td>
                    <td align="center">${r.discount_pct}%</td>
                    <td align="center"><strong>${r.final_price.toLocaleString()}</strong></td>
                </tr>
            </table>
            ${sigTable}
        </div>
    `;
    window.print();
}

// --- INITIALIZATION ---

function openSig(id) {
    sigPendingId = id;
    document.getElementById('sigModal').classList.add('open');
    clearSig();
}

function confirmSig() {
    let pin = document.getElementById('pin-input').value;
    let sig = document.getElementById('sigCanvas').toDataURL();
    doApprove(sigPendingId, sig, pin);
}

function clearCreatorSig() {
    const c = document.getElementById('creatorCanvas');
    c.getContext('2d').clearRect(0,0,c.width,c.height);
}

// ฟังก์ชันอื่นๆ (Login, Tabs, SigPad) ให้ใช้ Logic เดิมของคุณได้เลยครับ
// ผมตัดมาเฉพาะส่วนสำคัญเพื่อให้อ่านง่าย
</script>
</body>
</html>
