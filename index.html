<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KRM – ระบบขออนุมัติส่วนลด</title>
<link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700&family=Noto+Serif+Thai:wght@400;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
<style>
:root{--gold:#B8955A;--gold-l:#D4AF7A;--gold-d:#8A6C3A;--navy:#1A2540;--navy2:#243052;--cream:#FAF7F2;--cream2:#F0EBE0;--text:#2C2C2C;--muted:#7A7A7A;--border:#D9CEB8;--success:#1E6E47;--danger:#C0392B;--sh:0 4px 24px rgba(26,37,64,.10);}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Sarabun',sans-serif;background:var(--cream);color:var(--text);min-height:100vh;}
#cfg{display:none;} /* ซ่อนแถบแจ้งเตือนถาวร */
.hdr{background:var(--navy);padding:14px 28px;display:flex;align-items:center;gap:16px;}
.hdr h1{color:#fff;font-size:16px;font-weight:700;}.hdr p{color:var(--gold-l);font-size:12px;margin-top:2px;}
.tabs{background:var(--navy);display:flex;gap:2px;padding:0 22px;}
.tab{padding:9px 22px;border:none;background:rgba(255,255,255,.07);color:rgba(255,255,255,.5);font-family:'Sarabun',sans-serif;font-size:13px;font-weight:500;cursor:pointer;border-radius:7px 7px 0 0;transition:all .2s;}
.tab.active{background:var(--cream);color:var(--navy);font-weight:700;}
.tab:not(.active):hover{background:rgba(255,255,255,.14);color:#fff;}
.panel{display:none;}.panel.active{display:block;}
.fw{max-width:780px;margin:28px auto;padding:0 18px 60px;}
.sec{font-family:'Noto Serif Thai',serif;font-size:11.5px;font-weight:600;color:var(--gold-d);letter-spacing:.1em;text-transform:uppercase;border-bottom:1px solid var(--border);padding-bottom:6px;margin:22px 0 13px;}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:13px;}
.f{display:flex;flex-direction:column;gap:5px;}
.f label{font-size:11px;font-weight:700;color:var(--navy);letter-spacing:.04em;text-transform:uppercase;}
.f input,.f select,.f textarea{border:1.5px solid var(--border);border-radius:7px;padding:8px 11px;font-family:'Sarabun',sans-serif;font-size:14px;background:#fff;color:var(--text);outline:none;}
.f input:focus{border-color:var(--gold);}
.doc-picker{display:grid;grid-template-columns:repeat(4,1fr);gap:9px;margin-bottom:22px;}
.dc{border:2px solid var(--border);border-radius:10px;padding:13px 8px;text-align:center;cursor:pointer;background:#fff;transition:all .18s;}
.dc.sel{border-color:var(--gold);background:#FDF8F0;}
.dc .lbl{font-size:11.5px;font-weight:700;color:var(--navy);}
.form-section{display:none;}.form-section.active{display:block;}
.items-table{width:100%;border-collapse:collapse;min-width:540px;}
.items-table th{background:#000;color:#fff;font-size:11px;font-weight:600;padding:9px 10px;text-align:left;}
.items-table td{padding:5px;border-bottom:1px solid var(--cream2);}
.sum-bar{background:var(--navy);border-radius:10px;padding:16px 20px;margin-top:12px;display:grid;grid-template-columns:repeat(3,1fr);gap:12px;}
.sum-bar label{font-size:10.5px;color:var(--gold-l);text-transform:uppercase;}
.sum-bar .v{font-size:20px;font-weight:700;color:#fff;font-family:'Noto Serif Thai',serif;}
.badge{font-size:10px;font-weight:700;padding:3px 10px;border-radius:20px;text-transform:uppercase;white-space:nowrap;}
.badge.pending_mgr{background:#FEF3C7;color:#92400E;}
.badge.pending_cmo{background:#F5F3FF;color:#5B21B6;}
.badge.approved{background:#D1FAE5;color:#065F46;}
.badge.rejected{background:#FEE2E2;color:#991B1B;}
/* Card & acts */
.card{background:#fff;border:1px solid var(--border);border-radius:12px;margin-bottom:14px;box-shadow:var(--sh);overflow:hidden;}
.card-top{display:flex;justify-content:space-between;padding:13px 18px;background:var(--cream);border-bottom:1px solid var(--cream2);}
.card-acts{padding:11px 18px;border-top:1px solid var(--cream2);display:flex;gap:8px;align-items:center;}
.btn-approve{padding:8px 18px;background:var(--success);color:#fff;border:none;border-radius:7px;font-weight:700;cursor:pointer;}
.btn-reject{padding:8px 18px;border:2px solid var(--danger);border-radius:7px;background:#fff;color:var(--danger);font-weight:700;cursor:pointer;}
.btn-print{padding:8px 18px;background:var(--navy);color:#fff;border:none;border-radius:7px;font-weight:700;cursor:pointer;margin-left:auto;}
.modal-back{display:none;position:fixed;inset:0;z-index:10000;background:rgba(0,0,0,.55);align-items:center;justify-content:center;}
.modal-back.open{display:flex;}
.modal-box{background:#fff;border-radius:16px;padding:26px;width:92%;max-width:500px;}
#toast{position:fixed;bottom:22px;left:50%;transform:translateX(-50%);background:var(--navy);color:#fff;padding:10px 24px;border-radius:9px;font-size:13px;opacity:0;transition:0.3s;z-index:99999;}
#toast.show{opacity:1;}
/* Report styles */
.rpt-wrap{max-width:960px;margin:28px auto;padding:0 18px 60px;}
.rpt-bar{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:24px;}
.kpi{background:#fff;border:1px solid var(--border);border-radius:12px;padding:16px 18px;box-shadow:var(--sh);}
.kpi label{font-size:10.5px;color:var(--muted);text-transform:uppercase;}
.kpi .kv{font-size:22px;font-weight:700;color:var(--navy);margin-top:4px;}
.rpt-tbl{width:100%;border-collapse:collapse;background:#fff;border-radius:10px;overflow:hidden;box-shadow:var(--sh);margin-bottom:24px;font-size:13px;}
.rpt-tbl th{background:var(--navy);color:var(--gold-l);padding:10px 13px;text-align:left;}
.rpt-tbl td{padding:9px 13px;border-bottom:1px solid var(--cream2);}
@media print{body>*:not(#printArea){display:none!important;}#printArea{display:block!important;}}
</style>
</head>
<body>

<div id="login-screen" style="display:flex;position:fixed;inset:0;z-index:9000;background:var(--navy);align-items:center;justify-content:center;">
  <div style="width:92%;max-width:380px;text-align:center;">
    <h2 style="color:#fff;margin-bottom:24px;">KRM Discount System</h2>
    <div style="background:rgba(255,255,255,0.06);padding:30px;border-radius:14px;border:1px solid rgba(255,255,255,0.1);text-align:left;">
      <input id="login-user" placeholder="ชื่อผู้ใช้" style="width:100%;padding:12px;margin-bottom:10px;border-radius:8px;border:none;">
      <input id="login-pass" type="password" placeholder="รหัสผ่าน" style="width:100%;padding:12px;margin-bottom:20px;border-radius:8px;border:none;">
      <button onclick="doLogin()" style="width:100%;padding:13px;background:var(--gold);color:var(--navy);border:none;border-radius:9px;font-weight:700;cursor:pointer;">เข้าสู่ระบบ</button>
      <div id="login-error" style="color:#f87171;margin-top:12px;font-size:13px;text-align:center;"></div>
    </div>
  </div>
</div>

<div id="app-body" style="display:none;">
  <div class="hdr">
    <div style="flex:1;"><h1>ระบบขออนุมัติส่วนลด</h1><p>KRM Plastic Surgery Hospital</p></div>
    <span id="user-badge" style="color:var(--gold-l);font-size:13px;"></span>
    <button onclick="logout()" style="background:none;border:1px solid rgba(255,255,255,0.3);color:#fff;padding:5px 12px;border-radius:6px;cursor:pointer;margin-left:10px;">ออกจากระบบ</button>
  </div>
  
  <div class="tabs">
    <button class="tab active" id="tab-btn-form" onclick="switchTab('form')">📋 ยื่นคำขอ</button>
    <button class="tab" id="tab-btn-approve" onclick="switchTab('approve')">✅ อนุมัติ / ติดตาม</button>
    <button class="tab" id="tab-btn-report" onclick="switchTab('report')">📊 รายงาน</button>
  </div>

  <div id="tab-form" class="panel active">
    <div class="fw">
      <div class="doc-picker">
        <div class="dc sel" data-type="mixed" onclick="selType('mixed')"><div class="lbl">รายการรวม</div></div>
        <div class="dc" data-type="room" onclick="selType('room')"><div class="lbl">ส่วนลดห้องพัก</div></div>
        <div class="dc" data-type="procedure" onclick="selType('procedure')"><div class="lbl">ส่วนลดหัตถการ</div></div>
        <div class="dc" data-type="gift" onclick="selType('gift')"><div class="lbl">ของแถม</div></div>
      </div>
      <div class="sec">ข้อมูลลูกค้า</div>
      <div class="g2">
        <div class="f"><label>HN</label><input id="f-hn" placeholder="K69XXXX"></div>
        <div class="f"><label>ชื่อลูกค้า</label><input id="f-name"></div>
      </div>
      <div class="g2" style="margin-top:12px;">
        <div class="f"><label>ชื่อ Sale</label><input id="f-sale"></div>
        <div class="f"><label>วันที่นัด</label><input id="f-opdate" type="date"></div>
      </div>
      <div class="sec">รายการส่วนลด</div>
      <table class="items-table">
          <thead><tr><th>รายการ</th><th style="width:100px;">ราคาเต็ม</th><th style="width:80px;">ลด%</th><th style="width:50px;"></th></tr></thead>
          <tbody id="items-body"></tbody>
      </table>
      <button class="add-row-btn" onclick="addItem()">+ เพิ่มรายการ</button>
      <div class="sum-bar">
        <div><label>ยอดเต็ม</label><div class="v" id="sum-orig">0</div></div>
        <div><label>ส่วนลด</label><div class="v" id="sum-disc">0</div></div>
        <div><label>จ่ายจริง</label><div class="v hl" id="sum-final">0</div></div>
      </div>
      <div class="sec" style="margin-top:20px;">เหตุผล</div>
      <textarea id="f-reason" style="width:100%;min-height:80px;border-radius:8px;padding:10px;border:1.5px solid var(--border);"></textarea>
      <div class="sec">ลายเซ็นผู้จัดทำ</div>
      <div class="sig-canvas-wrap">
        <canvas id="creatorCanvas" width="700" height="120" style="width:100%;cursor:crosshair;touch-action:none;"></canvas>
      </div>
      <button class="btn-submit" onclick="submitRequest()">📤 ส่งคำขออนุมัติ</button>
    </div>
  </div>

  <div id="tab-approve" class="panel">
    <div class="aw">
      <div class="filters">
        <button class="fbtn active" onclick="filterBy('all',this)">ทั้งหมด <span id="cnt-all" class="cnt">0</span></button>
        <button class="fbtn" onclick="filterBy('pending',this)">รออนุมัติ <span id="cnt-pending" class="cnt">0</span></button>
        <button class="fbtn" onclick="filterBy('approved',this)">อนุมัติแล้ว <span id="cnt-approved" class="cnt">0</span></button>
        <button class="fbtn" style="margin-left:auto;" onclick="loadReqs()">🔄 รีเฟรช</button>
      </div>
      <div id="req-list"></div>
    </div>
  </div>

  <div id="tab-report" class="panel">
    <div class="rpt-wrap">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;">
            <h2 style="font-size:18px;">📊 รายงานสรุป</h2>
            <div style="display:flex; gap:8px;">
                <select id="rpt-period" onchange="updateReportUI()" style="padding:8px; border-radius:6px; border:1.5px solid var(--border);">
                    <option value="day">รายวัน</option><option value="month" selected>รายเดือน</option><option value="year">รายปี</option>
                </select>
                <input type="date" id="rpt-date" style="display:none; padding:7px; border-radius:6px; border:1.5px solid var(--border);">
                <select id="rpt-month" style="padding:8px; border-radius:6px; border:1.5px solid var(--border);"></select>
                <select id="rpt-year" style="padding:8px; border-radius:6px; border:1.5px solid var(--border);"></select>
                <button onclick="buildReport()" class="fbtn" style="background:var(--navy); color:#fff; border:none;">ดูรายงาน</button>
            </div>
        </div>
        <div id="rpt-kpi" class="rpt-bar"></div>
        <table class="rpt-tbl">
            <thead><tr><th>วันที่</th><th>ลูกค้า</th><th>HN</th><th>Sale</th><th>ส่วนลด%</th><th>มูลค่า</th><th>สถานะ</th></tr></thead>
            <tbody id="rpt-body"></tbody>
        </table>
    </div>
  </div>
</div>

<div id="sigModal" class="modal-back">
  <div class="modal-box" style="text-align:center;">
    <h3>✍️ เซ็นอนุมัติ</h3>
    <input id="pin-input" type="password" maxlength="4" placeholder="ใส่ PIN 4 หลัก" style="width:100%;padding:12px;margin:15px 0;text-align:center;font-size:24px;letter-spacing:10px; border:1.5px solid var(--border); border-radius:8px;">
    <canvas id="sigCanvas" width="450" height="170" style="border:1px dashed #ccc; width:100%; background:#fafafa; cursor:crosshair;"></canvas>
    <div style="display:flex;gap:10px;margin-top:20px;">
      <button onclick="confirmApprove()" style="flex:2;padding:13px;background:var(--success);color:#fff;border:none;border-radius:10px;font-weight:700;cursor:pointer;">✅ ยืนยันอนุมัติ</button>
      <button onclick="closeSigModal()" style="flex:1;padding:13px;border:1.5px solid #ccc;border-radius:10px;cursor:pointer;">ยกเลิก</button>
    </div>
  </div>
</div>

<div id="toast"></div>
<div id="printArea"></div>

<script>
// ════════════════════════════════════════════════
// CONFIG
// ════════════════════════════════════════════════
const SUPABASE_URL = 'https://hnpccpuwxrebxangdane.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImhucGNjcHV3eHJlYnhhbmdkYW5lIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQyNTAxNTAsImV4cCI6MjA4OTgyNjE1MH0.34CqrdqVeHF6_RUArM2UIIf3oefqrHeMwuiNJwEV1Vs';
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
const DISCOUNT_THRESHOLD = 10;
const USERS = {
  sale_mgr: { name:'นภา ชำนาญรบ', role:'Sale Manager', email:'chnabha2529@gmail.com', pin:'1234' },
  cmo:      { name:'นายสกุลชัย ดันตระบัณฑิตย์', role:'Chief Marketing Officer', email:'Sakulchai.t@krmhospital-inter.com', pin:'5678' }
};
const LOGIN_ACCOUNTS = [
  { username:'sale1', password:'sale1234', label:'Sale 1', role:'sale' },
  { username:'napa', password:'mgr1234', label:'นภา ชำนาญรบ', role:'manager' },
  { username:'cmo', password:'cmo5678', label:'สกุลชัย', role:'cmo' },
  { username:'accounting', password:'acc1234', label:'Accounting', role:'accounting' }
];

emailjs.init("M3GFyEbVcO48C7wy0");

let currentUser = null, allReqs = [], sigPendingId = null, curFilter = 'all', curType = 'mixed', itemRC = 0;

// ── AUTH ──
function doLogin() {
  const u = document.getElementById('login-user').value.trim().toLowerCase();
  const p = document.getElementById('login-pass').value;
  const found = LOGIN_ACCOUNTS.find(a => a.username === u && a.password === p);
  if (found) {
    currentUser = found;
    document.getElementById('login-screen').style.display = 'none';
    document.getElementById('app-body').style.display = 'block';
    document.getElementById('user-badge').textContent = `${found.label} (${found.role})`;
    initReportDates(); loadReqs();
  } else {
    document.getElementById('login-error').textContent = "❌ Login Failed";
  }
}
function logout() { location.reload(); }

// ── FORM LOGIC ──
function selType(t) { curType = t; document.querySelectorAll('.dc').forEach(c => c.classList.toggle('sel', c.dataset.type === t)); }
function addItem() {
    itemRC++;
    const tr = document.createElement('tr');
    tr.id = 'item-' + itemRC;
    tr.innerHTML = `<td><input placeholder="รายการ"></td><td><input type="number" oninput="calcItems()" value="0"></td><td><input type="number" oninput="calcItems()" value="0"></td><td><button class="del-btn" onclick="this.parentElement.parentElement.remove(); calcItems();">✕</button></td>`;
    document.getElementById('items-body').appendChild(tr);
}
function calcItems() {
    let tO = 0, tD = 0;
    document.querySelectorAll('#items-body tr').forEach(tr => {
        const inp = tr.querySelectorAll('input');
        const p = parseFloat(inp[1].value)||0; const pct = parseFloat(inp[2].value)||0;
        tO += p; tD += (p*pct/100);
    });
    document.getElementById('sum-orig').textContent = tO.toLocaleString();
    document.getElementById('sum-disc').textContent = tD.toLocaleString();
    document.getElementById('sum-final').textContent = (tO-tD).toLocaleString();
}

// ── 2-STEP LOGIC ──
async function submitRequest() {
    const tO = parseFloat(document.getElementById('sum-orig').textContent.replace(/,/g,''))||0;
    const tD = parseFloat(document.getElementById('sum-disc').textContent.replace(/,/g,''))||0;
    const dpct = tO > 0 ? (tD/tO)*100 : 0;
    
    let status = 'pending_mgr';
    if(currentUser.role === 'manager') { status = (dpct > DISCOUNT_THRESHOLD) ? 'pending_cmo' : 'approved'; }

    const payload = {
        hn: document.getElementById('f-hn').value, customer_name: document.getElementById('f-name').value,
        sale_agent: document.getElementById('f-sale').value, original_price: tO, discount_pct: Math.round(dpct),
        discount_amount: tD, final_price: tO-tD, status: status,
        doc_data: { creator_sig: document.getElementById('creatorCanvas').toDataURL(), items: [] },
        created_at: new Date().toISOString()
    };

    const { data, error } = await sb.from('approval_requests').insert(payload).select().single();
    if(!error) { showToast("ส่งคำขอแล้ว: " + status); if(status !== 'approved') sendEmail(data); switchTab('approve'); }
}

async function confirmApprove() {
    const pin = document.getElementById('pin-input').value;
    const r = allReqs.find(x => x.id === sigPendingId);
    const targetUser = (r.status === 'pending_mgr') ? USERS.sale_mgr : USERS.cmo;
    if(pin !== targetUser.pin) return showToast("❌ PIN ผิด");

    let next = 'approved';
    if(r.status === 'pending_mgr' && r.discount_pct > DISCOUNT_THRESHOLD) next = 'pending_cmo';

    const { error } = await sb.from('approval_requests').update({ status: next, approved_by: currentUser.label }).eq('id', sigPendingId);
    if(!error) { showToast("ดำเนินการสำเร็จ"); if(next === 'pending_cmo') sendEmail({...r, status:'pending_cmo'}); closeSigModal(); loadReqs(); }
}

function sendEmail(r) {
    const target = (r.status === 'pending_cmo') ? USERS.cmo : USERS.sale_mgr;
    emailjs.send('service_k3m1kzl', 'template_o5c9od9', { to_email: target.email, to_role: target.role, customer_name: r.customer_name, hn: r.hn, final_price: r.final_price.toLocaleString(), app_url: window.location.href });
}

// ── RENDER & REPORT ──
async function loadReqs() { const { data } = await sb.from('approval_requests').select('*').order('created_at',{ascending:false}); allReqs = data||[]; renderList(); updateCounts(); }

function renderList() {
    const SL = { pending_mgr:'รอ Manager', pending_cmo:'รอ CMO', approved:'อนุมัติแล้ว', rejected:'ไม่อนุมัติ' };
    document.getElementById('req-list').innerHTML = allReqs.filter(r => curFilter==='all' || r.status.includes(curFilter)).map(r => `
        <div class="card">
            <div class="card-top"><strong>${r.customer_name} (HN: ${r.hn})</strong><span class="badge ${r.status}">${SL[r.status]||r.status}</span></div>
            <div style="padding:15px; font-size:14px;">ยื่นโดย: ${r.sale_agent} | ลด: ${r.discount_pct}% | <strong>จ่ายจริง: ${r.final_price.toLocaleString()} ฿</strong></div>
            <div class="card-acts">
                ${(currentUser.role==='manager'&&r.status==='pending_mgr')||(currentUser.role==='cmo'&&r.status==='pending_cmo') ? `<button class="btn-approve" onclick="openSig('${r.id}')">✍️ อนุมัติ</button>` : ''}
                <button class="btn-print" onclick="printDoc('${r.id}')">🖨️ พิมพ์</button>
            </div>
        </div>
    `).join('');
}

function initReportDates() {
    const yr = document.getElementById('rpt-year'); const cur = new Date().getFullYear();
    for(let i=cur; i>=cur-2; i--) yr.add(new Option(i+543, i));
    const mo = document.getElementById('rpt-month'); const mNames = ['มกราคม','กุมภาพันธ์','มีนาคม','เมษายน','พฤษภาคม','มิถุนายน','กรกฎาคม','สิงหาคม','กันยายน','ตุลาคม','พฤศจิกายน','ธันวาคม'];
    mNames.forEach((n, i) => mo.add(new Option(n, i)));
}

function updateReportUI() {
    const p = document.getElementById('rpt-period').value;
    document.getElementById('rpt-date').style.display = (p==='day') ? 'inline-block' : 'none';
    document.getElementById('rpt-month').style.display = (p==='month') ? 'inline-block' : 'none';
}

function buildReport() {
    const p = document.getElementById('rpt-period').value;
    const filtered = allReqs.filter(r => {
        const d = new Date(r.created_at);
        if(p==='day') return d.toISOString().split('T')[0] === document.getElementById('rpt-date').value;
        if(p==='month') return d.getMonth() == document.getElementById('rpt-month').value && d.getFullYear() == document.getElementById('rpt-year').value;
        return d.getFullYear() == document.getElementById('rpt-year').value;
    });
    document.getElementById('rpt-kpi').innerHTML = `<div class="kpi"><label>ทั้งหมด</label><div class="kv">${filtered.length}</div></div><div class="kpi"><label>รวมส่วนลด</label><div class="kv">${filtered.reduce((s,x)=>s+x.discount_amount,0).toLocaleString()} ฿</div></div>`;
    document.getElementById('rpt-body').innerHTML = filtered.map(r => `<tr><td>${new Date(r.created_at).toLocaleDateString()}</td><td>${r.customer_name}</td><td>${r.hn}</td><td>${r.sale_agent}</td><td>${r.discount_pct}%</td><td>${r.discount_amount.toLocaleString()}</td><td>${r.status}</td></tr>`).join('');
}

// ── UTILS ──
function openSig(id) { sigPendingId=id; document.getElementById('sigModal').classList.add('open'); }
function closeSigModal() { document.getElementById('sigModal').classList.remove('open'); document.getElementById('pin-input').value=''; }
function showToast(m) { const t=document.getElementById('toast'); t.textContent=m; t.classList.add('show'); setTimeout(()=>t.classList.remove('show'),3000); }
function switchTab(t) { document.querySelectorAll('.tab').forEach(x=>x.classList.remove('active')); document.querySelectorAll('.panel').forEach(x=>x.classList.remove('active')); document.getElementById('tab-btn-'+t).classList.add('active'); document.getElementById('tab-'+t).classList.add('active'); if(t==='report') buildReport(); }
function filterBy(s, b) { curFilter=s; document.querySelectorAll('.fbtn').forEach(x=>x.classList.remove('active')); b.classList.add('active'); renderList(); }
function updateCounts() { document.getElementById('cnt-all').textContent=allReqs.length; document.getElementById('cnt-pending').textContent=allReqs.filter(r=>r.status.includes('pending')).length; document.getElementById('cnt-approved').textContent=allReqs.filter(r=>r.status==='approved').length; }
function clearCreatorSig() { const c=document.getElementById('creatorCanvas'); c.getContext('2d').clearRect(0,0,700,120); }
function printDoc(id) { alert("ระบบกำลังพิมพ์ HN: " + allReqs.find(x=>x.id===id).hn); }

// Signature Pad Init
function initPad(id) {
    const c = document.getElementById(id); const ctx = c.getContext('2d'); let draw = false;
    c.addEventListener('mousedown',()=>draw=true); c.addEventListener('mouseup',()=>{draw=false;ctx.beginPath();});
    c.addEventListener('mousemove',e=>{if(!draw)return; ctx.lineWidth=2; ctx.lineCap='round'; const r=c.getBoundingClientRect(); ctx.lineTo(e.clientX-r.left, e.clientY-r.top); ctx.stroke();});
}
initPad('creatorCanvas'); initPad('sigCanvas');
addItem();
</script>
