<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KRM – ระบบขออนุมัติส่วนลด (2-Step Flow)</title>
<link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700&family=Noto+Serif+Thai:wght@400;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
<style>
:root{--gold:#B8955A;--gold-l:#D4AF7A;--gold-d:#8A6C3A;--navy:#1A2540;--navy2:#243052;--cream:#FAF7F2;--cream2:#F0EBE0;--text:#2C2C2C;--muted:#7A7A7A;--border:#D9CEB8;--success:#1E6E47;--danger:#C0392B;--purple:#5B21B6;--sh:0 4px 24px rgba(26,37,64,.10);}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Sarabun',sans-serif;background:var(--cream);color:var(--text);min-height:100vh;}
/* UI Components */
.hdr{background:var(--navy);padding:14px 28px;display:flex;align-items:center;gap:16px;}
.hdr h1{color:#fff;font-size:16px;font-weight:700;}.hdr p{color:var(--gold-l);font-size:12px;margin-top:2px;}
.tabs{background:var(--navy);display:flex;gap:2px;padding:0 22px;}
.tab{padding:9px 22px;border:none;background:rgba(255,255,255,.07);color:rgba(255,255,255,.5);font-family:'Sarabun',sans-serif;font-size:13px;font-weight:500;cursor:pointer;border-radius:7px 7px 0 0;transition:all .2s;}
.tab.active{background:var(--cream);color:var(--navy);font-weight:700;}
.panel{display:none;}.panel.active{display:block;}
.fw{max-width:780px;margin:28px auto;padding:0 18px 60px;}
.sec{font-family:'Noto Serif Thai',serif;font-size:11.5px;font-weight:600;color:var(--gold-d);letter-spacing:.1em;text-transform:uppercase;border-bottom:1px solid var(--border);padding-bottom:6px;margin:22px 0 13px;}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:13px;}
.f{display:flex;flex-direction:column;gap:5px;}
.f label{font-size:11px;font-weight:700;color:var(--navy);letter-spacing:.04em;}
.f input,.f select,.f textarea{border:1.5px solid var(--border);border-radius:7px;padding:8px 11px;font-family:'Sarabun',sans-serif;font-size:14px;outline:none;}
.f input:focus{border-color:var(--gold);}
/* Table & Items */
.items-table{width:100%;border-collapse:collapse;margin-top:10px;}
.items-table th{background:#000;color:#fff;font-size:11px;padding:9px;text-align:left;}
.items-table td{padding:5px;border-bottom:1px solid var(--cream2);}
.sum-bar{background:var(--navy);border-radius:10px;padding:16px 20px;margin-top:12px;display:grid;grid-template-columns:repeat(3,1fr);gap:12px;}
.sum-bar label{font-size:10.5px;color:var(--gold-l);}
.sum-bar .v{font-size:20px;font-weight:700;color:#fff;font-family:'Noto Serif Thai',serif;}
/* Badges */
.badge{font-size:10px;font-weight:700;padding:3px 10px;border-radius:20px;text-transform:uppercase;}
.badge.pending_mgr{background:#FEF3C7;color:#92400E;}
.badge.pending_cmo{background:#F5F3FF;color:var(--purple);}
.badge.approved{background:#D1FAE5;color:#065F46;}
.badge.rejected{background:#FEE2E2;color:#991B1B;}
/* Signature */
.sig-canvas-wrap{border:2px dashed var(--border);border-radius:10px;background:#FAFAF8;margin-top:10px;}
.btn-submit{width:100%;margin-top:22px;padding:14px;background:var(--gold);color:var(--navy);border:none;border-radius:9px;font-weight:700;cursor:pointer;box-shadow:0 4px 14px rgba(184,149,90,.3);}
/* Modal */
.modal-back{display:none;position:fixed;inset:0;z-index:1000;background:rgba(0,0,0,.55);align-items:center;justify-content:center;}
.modal-back.open{display:flex;}
.modal-box{background:#fff;border-radius:16px;padding:26px;width:92%;max-width:450px;}
#toast{position:fixed;bottom:22px;left:50%;transform:translateX(-50%);background:var(--navy);color:#fff;padding:10px 24px;border-radius:9px;opacity:0;transition:0.3s;z-index:9999;}
#toast.show{opacity:1;}
</style>
</head>
<body>

<div id="login-screen" style="display:flex;position:fixed;inset:0;z-index:9000;background:var(--navy);align-items:center;justify-content:center;">
  <div style="width:92%;max-width:380px;text-align:center;">
    <h2 style="color:#fff;margin-bottom:20px;">KRM Login</h2>
    <div style="background:rgba(255,255,255,0.1);padding:30px;border-radius:15px;">
      <input id="login-user" placeholder="Username" style="width:100%;padding:12px;margin-bottom:10px;border-radius:8px;border:none;">
      <input id="login-pass" type="password" placeholder="Password" style="width:100%;padding:12px;margin-bottom:20px;border-radius:8px;border:none;">
      <button onclick="doLogin()" style="width:100%;padding:12px;background:var(--gold);border:none;border-radius:8px;font-weight:700;cursor:pointer;">เข้าสู่ระบบ</button>
      <div id="login-error" style="color:#f87171;margin-top:10px;font-size:13px;"></div>
    </div>
  </div>
</div>

<div id="app-body" style="display:none;">
    <div class="hdr">
        <div style="flex:1;"><h1>ระบบขออนุมัติส่วนลด</h1><p>KRM Plastic Surgery Hospital</p></div>
        <span id="user-badge" style="color:var(--gold-l);font-size:13px;"></span>
        <button onclick="logout()" style="background:none;border:1px solid #fff;color:#fff;padding:4px 10px;border-radius:5px;cursor:pointer;margin-left:10px;">Logout</button>
    </div>

    <div class="tabs">
        <button class="tab active" id="tab-btn-form" onclick="switchTab('form')">📋 ยื่นคำขอ</button>
        <button class="tab" id="tab-btn-approve" onclick="switchTab('approve')">✅ อนุมัติ / ติดตาม</button>
    </div>

    <div id="tab-form" class="panel active">
        <div class="fw">
            <div class="sec">ข้อมูลลูกค้า</div>
            <div class="g2">
                <div class="f"><label>HN</label><input id="f-hn" placeholder="K69XXXX"></div>
                <div class="f"><label>ชื่อลูกค้า</label><input id="f-name"></div>
            </div>
            <div class="g2" style="margin-top:10px;">
                <div class="f"><label>ชื่อ Sale</label><input id="f-sale"></div>
                <div class="f"><label>วันที่นัด</label><input id="f-opdate" type="date"></div>
            </div>

            <div class="sec">รายการส่วนลด</div>
            <div id="sec-procedure">
                <div class="g2">
                    <div class="f"><label>ราคาเต็ม (฿)</label><input id="p-full" type="number" oninput="calc()"></div>
                    <div class="f"><label>ส่วนลด (%)</label><input id="p-pct" type="number" oninput="calc()"></div>
                </div>
                <div class="sum-bar">
                    <div><label>ยอดเต็ม</label><div class="v" id="p-total">0</div></div>
                    <div><label>ส่วนลด</label><div class="v" id="p-disc">0</div></div>
                    <div><label>ลูกค้าจ่าย</label><div class="v" id="p-final" style="color:var(--gold-l)">0</div></div>
                </div>
            </div>

            <div class="sec">ลายเซ็นผู้จัดทำ</div>
            <div class="sig-canvas-wrap">
                <canvas id="creatorCanvas" width="700" height="120" style="width:100%;cursor:crosshair;"></canvas>
            </div>
            <button onclick="clearCreatorSig()" style="margin-top:5px;font-size:12px;cursor:pointer;">ล้างลายเซ็น</button>

            <button class="btn-submit" onclick="submitRequest()">📤 ส่งคำขออนุมัติ</button>
        </div>
    </div>

    <div id="tab-approve" class="panel">
        <div class="fw" id="req-list">
            </div>
    </div>
</div>

<div id="sigModal" class="modal-back">
    <div class="modal-box">
        <h3 id="sig-title">เซ็นอนุมัติ</h3>
        <p id="sig-desc" style="font-size:13px;color:var(--muted);margin-bottom:10px;"></p>
        <div style="margin-bottom:10px;">
            <input id="pin-input" type="password" maxlength="4" placeholder="ใส่ PIN 4 หลัก" style="width:100%;padding:10px;text-align:center;font-size:18px;letter-spacing:10px;">
        </div>
        <canvas id="sigCanvas" width="400" height="150" style="border:1px dashed #ccc;width:100%;background:#fafafa;"></canvas>
        <div style="display:flex;gap:10px;margin-top:15px;">
            <button onclick="confirmApprove()" style="flex:2;padding:12px;background:var(--success);color:#fff;border:none;border-radius:8px;font-weight:700;cursor:pointer;">✅ ยืนยันอนุมัติ</button>
            <button onclick="closeSigModal()" style="flex:1;padding:12px;border:1px solid #ccc;border-radius:8px;cursor:pointer;">ยกเลิก</button>
        </div>
    </div>
</div>

<div id="toast"></div>

<script>
// --- CONFIG ---
const SUPABASE_URL = 'https://hnpccpuwxrebxangdane.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...'; // ใส่ Key เต็มของคุณ
const DISCOUNT_THRESHOLD = 10;
const USERS = {
  sale_mgr: { name:'นภา ชำนาญรบ', role:'Sale Manager', email:'Salesurgery@krmhospital-inter.com', pin:'1234' },
  cmo: { name:'นายสกุลชัย ดันตระบัณฑิตย์', role:'CMO', email:'Sakulchai.t@krmhospital-inter.com', pin:'5678' }
};
const ACCOUNTS = [
  { u:'sale1', p:'1234', label:'Sale Team', role:'sale' },
  { u:'napa', p:'mgr1234', label:'นภา ชำนาญรบ', role:'manager' },
  { u:'cmo', p:'cmo5678', label:'สกุลชัย', role:'cmo' }
];
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
emailjs.init("M3GFyEbVcO48C7wy0"); // ใส่ Public Key ของคุณ

let currentUser = null;
let allReqs = [];
let pendingApproveId = null;

// --- LOGIC: CALC ---
function calc() {
    let full = parseFloat(document.getElementById('p-full').value)||0;
    let pct = parseFloat(document.getElementById('p-pct').value)||0;
    let disc = (full * pct) / 100;
    let final = full - disc;
    document.getElementById('p-total').textContent = full.toLocaleString();
    document.getElementById('p-disc').textContent = disc.toLocaleString();
    document.getElementById('p-final').textContent = final.toLocaleString();
}

// --- LOGIC: SUBMIT ---
async function submitRequest() {
    let hn = document.getElementById('f-hn').value;
    let name = document.getElementById('f-name').value;
    let sale = document.getElementById('f-sale').value;
    let full = parseFloat(document.getElementById('p-full').value)||0;
    let pct = parseFloat(document.getElementById('p-pct').value)||0;
    let sig = document.getElementById('creatorCanvas').toDataURL();

    if(!hn || !name || full <= 0) return showToast("กรุณากรอกข้อมูลให้ครบ");

    // Logic: กำหนดสถานะเริ่มต้น
    let status = 'pending_mgr';
    if(currentUser.role === 'manager') {
        status = (pct > DISCOUNT_THRESHOLD) ? 'pending_cmo' : 'approved';
    }

    const payload = {
        hn, customer_name: name, sale_agent: sale,
        original_price: full, discount_pct: pct,
        discount_amount: (full*pct)/100, final_price: full-((full*pct)/100),
        status: status,
        doc_data: { creator_sig: sig, created_by_role: currentUser.role, opdate: document.getElementById('f-opdate').value }
    };

    const { data, error } = await sb.from('approval_requests').insert(payload).select().single();
    if(error) return showToast("Error: " + error.message);

    showToast("ส่งคำขอเรียบร้อย สถานะ: " + status);
    sendEmailNotification(data); // ส่งเมล์หาคนที่มีสิทธิ์อนุมัติคนแรก
    resetForm();
    switchTab('approve');
}

// --- LOGIC: APPROVE ---
function openApprove(id) {
    pendingApproveId = id;
    let r = allReqs.find(x => x.id === id);
    document.getElementById('sig-desc').textContent = `อนุมัติให้คุณ ${r.customer_name} (ส่วนลด ${r.discount_pct}%)`;
    document.getElementById('sigModal').classList.add('open');
}

async function confirmApprove() {
    let pin = document.getElementById('pin-input').value;
    let sig = document.getElementById('sigCanvas').toDataURL();
    let r = allReqs.find(x => x.id === pendingApproveId);

    // ตรวจสอบสิทธิ์และ PIN
    let requiredUser = (r.status === 'pending_mgr') ? USERS.sale_mgr : USERS.cmo;
    if(pin !== requiredUser.pin) return alert("PIN ไม่ถูกต้อง");

    let nextStatus = 'approved';
    // ถ้า Manager เซ็นแล้วส่วนลด > 10% ให้ส่งต่อหา CMO
    if(r.status === 'pending_mgr' && r.discount_pct > DISCOUNT_THRESHOLD) {
        nextStatus = 'pending_cmo';
    }

    let updatedDocData = { ...r.doc_data, last_sig: sig, last_signer: requiredUser.name };

    const { data, error } = await sb.from('approval_requests')
        .update({ status: nextStatus, doc_data: updatedDocData })
        .eq('id', pendingApproveId).select().single();

    if(!error) {
        showToast(nextStatus === 'pending_cmo' ? "ส่งต่อให้ CMO แล้ว" : "อนุมัติเสร็จสมบูรณ์");
        closeSigModal();
        sendEmailNotification(data); // ส่งเมล์หาคนถัดไป (ถ้ามี)
        loadReqs();
    }
}

// --- EMAIL NOTIFICATION ---
function sendEmailNotification(r) {
    let target = null;
    if(r.status === 'pending_mgr') target = USERS.sale_mgr;
    if(r.status === 'pending_cmo') target = USERS.cmo;

    if(!target) return; // ถ้าสถานะเป็น approved หรืออื่นๆ ไม่ต้องส่งเมล์

    const params = {
        to_email: target.email,
        to_name: target.name,
        customer_name: r.customer_name,
        discount_info: `${r.discount_pct}% (${r.discount_amount.toLocaleString()} บาท)`,
        link: window.location.href
    };

    emailjs.send("service_k3m1kzl", "template_o5c9od9", params)
        .then(() => console.log("Email sent to " + target.role))
        .catch(err => console.error("Email error", err));
}

// --- UI & AUTH ---
function doLogin() {
    let u = document.getElementById('login-user').value;
    let p = document.getElementById('login-pass').value;
    let acc = ACCOUNTS.find(x => x.u === u && x.p === p);
    if(acc) {
        currentUser = acc;
        document.getElementById('login-screen').style.display = 'none';
        document.getElementById('app-body').style.display = 'block';
        document.getElementById('user-badge').textContent = `${acc.label} (${acc.role})`;
        loadReqs();
    } else {
        document.getElementById('login-error').textContent = "Login Fail!";
    }
}

async function loadReqs() {
    const { data } = await sb.from('approval_requests').select('*').order('created_at', {ascending:false});
    allReqs = data || [];
    renderList();
}

function renderList() {
    const list = document.getElementById('req-list');
    list.innerHTML = allReqs.map(r => {
        let canViewApprove = (currentUser.role === 'manager' && r.status === 'pending_mgr') || 
                             (currentUser.role === 'cmo' && r.status === 'pending_cmo');
        
        return `
            <div style="background:#fff; padding:15px; border-radius:10px; margin-bottom:10px; border:1px solid var(--border);">
                <div style="display:flex; justify-content:space-between;">
                    <strong>${r.customer_name} (HN: ${r.hn})</strong>
                    <span class="badge ${r.status}">${r.status}</span>
                </div>
                <div style="font-size:13px; color:var(--muted); margin:5px 0;">
                    ส่วนลด: ${r.discount_pct}% | ยอดจ่าย: ${r.final_price.toLocaleString()} บาท
                </div>
                ${canViewApprove ? `<button onclick="openApprove('${r.id}')" style="background:var(--navy); color:#fff; border:none; padding:8px 15px; border-radius:5px; cursor:pointer; margin-top:5px;">✍️ จัดการอนุมัติ</button>` : ''}
            </div>
        `;
    }).join('');
}

function showToast(m){ 
    let t=document.getElementById('toast'); t.textContent=m; t.classList.add('show');
    setTimeout(()=>t.classList.remove('show'), 3000);
}
function switchTab(t){
    document.querySelectorAll('.tab').forEach(x=>x.classList.remove('active'));
    document.querySelectorAll('.panel').forEach(x=>x.classList.remove('active'));
    document.getElementById('tab-btn-'+t).classList.add('active');
    document.getElementById('tab-'+t).classList.add('active');
    if(t==='approve') loadReqs();
}
function logout(){ location.reload(); }
function resetForm(){ document.getElementById('f-hn').value=''; document.getElementById('p-full').value=''; document.getElementById('p-pct').value=''; clearCreatorSig(); }

// Signature Pad Logic (Simple)
let creatorCtx = document.getElementById('creatorCanvas').getContext('2d');
let sigCtx = document.getElementById('sigCanvas').getContext('2d');
let drawing = false;
function setupSig(canvas, ctx) {
    canvas.addEventListener('mousedown', () => drawing = true);
    canvas.addEventListener('mouseup', () => { drawing = false; ctx.beginPath(); });
    canvas.addEventListener('mousemove', (e) => {
        if(!drawing) return;
        ctx.lineWidth = 2; ctx.lineCap = 'round'; ctx.strokeStyle = '#000';
        let rect = canvas.getBoundingClientRect();
        ctx.lineTo(e.clientX - rect.left, e.clientY - rect.top);
        ctx.stroke();
    });
}
setupSig(document.getElementById('creatorCanvas'), creatorCtx);
setupSig(document.getElementById('sigCanvas'), sigCtx);
function clearCreatorSig(){ creatorCtx.clearRect(0,0,700,120); }
function closeSigModal(){ document.getElementById('sigModal').classList.remove('open'); sigCtx.clearRect(0,0,400,150); document.getElementById('pin-input').value=''; }

</script>
</body>
</html>
